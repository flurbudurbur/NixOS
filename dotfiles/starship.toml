"$schema" = 'https://starship.rs/config-schema.json'

format = """
[@THEME_ICON@](fg:accent) \
$username\
$directory\
$git_branch\
$git_status\
$docker_context\
$nix_shell\
$fill\
$nodejs\
$java\
$rust\
$cmd_duration\
$time\n  \
$status\
[уұһӘ](fg:accent) \
"""

palette = "theme"

[directory]
format = "[оӮ¶](fg:bg_select)[ $path ]($style)[оӮҙ](fg:bg_select) "
style = "bg:bg_select fg:blue"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[directory.substitutions]
Documents = "у°Ҳҷ"
Downloads = "пҖҷ "
Music = "пҖҒ "
Pictures = "пҖҫ "

[fill]
style = "fg:bg_select"
symbol = " "

[git_branch]
format = "[оӮ¶](fg:bg_select)[ $symbol $branch ]($style)[оӮҙ](fg:bg_select) "
style = "bg:bg_select fg:cyan"
symbol = "пҗҳ"

[git_status]
disabled = false
style = "bg:bg_select fg:error"
format = '[оӮ¶](fg:bg_select)([$all_status$ahead_behind]($style))[оӮҙ](fg:bg_select) '
up_to_date = '[ вң“ ](bg:bg_select fg:accent)'
untracked = '[?\($count\)](bg:bg_select fg:warning)'
stashed = '[\$](bg:bg_select fg:accent)'
modified = '[!\($count\)](bg:bg_select fg:warning)'
renamed = '[В»\($count\)](bg:bg_select fg:accent)'
deleted = '[вңҳ\($count\)](style)'
staged = '[++\($count\)](bg:bg_select fg:warning)'
ahead = '[вҮЎ\(${count}\)](bg:bg_select fg:cyan)'
diverged = 'вҮ•[\[](bg:bg_select fg:accent)[вҮЎ\(${ahead_count}\)](bg:bg_select fg:cyan)[вҮЈ\(${behind_count}\)](bg:bg_select fg:accent2)[\]](bg:bg_select fg:accent)'
behind = '[вҮЈ\(${count}\)](bg:bg_select fg:accent2)'

[time]
disabled = false
format = " [оӮ¶](fg:bg_select)[ $time у°ҙҲ ]($style)[оӮҙ](fg:bg_select)"
style = "bg:bg_select fg:accent2"
time_format = "%I:%M%P"
use_12hr = true

[username]
disabled = false
format = "[оӮ¶](fg:bg_select)[ у°§ұ $user ]($style)[оӮҙ](fg:bg_select) "
show_always = true
style_root = "bg:bg_select fg:accent"
style_user = "bg:bg_select fg:accent"

# Languages

[java]
style = "bg:bg_select fg:blue"
format = " [оӮ¶](fg:bg_select)[ $symbol$version ]($style)[оӮҙ](fg:bg_select)"
disabled = false
symbol = "оү– "

[nodejs]
style = "bg:bg_select fg:blue"
format = " [оӮ¶](fg:bg_select)[ $symbol$version ]($style)[оӮҙ](fg:bg_select)"
disabled = false
symbol = "у°Һҷ "

[rust]
style = "bg:bg_select fg:blue"
format = " [оӮ¶](fg:bg_select)[ $symbol$version ]($style)[оӮҙ](fg:bg_select)"
disabled = false
symbol = "оһЁ "

# Environment

[nix_shell]
style = "bg:bg_select fg:cyan"
format = "[оӮ¶](fg:bg_select)[ $symbol$state ]($style)[оӮҙ](fg:bg_select) "
disabled = false
symbol = "вқ„ "

[docker_context]
style = "bg:bg_select fg:cyan"
format = "[оӮ¶](fg:bg_select)[ $symbol$context ]($style)[оӮҙ](fg:bg_select) "
disabled = false
symbol = "рҹҗі "
only_with_files = true

[cmd_duration]
style = "bg:bg_select fg:warning"
format = "[оӮ¶](fg:bg_select)[ вҸұ $duration ]($style)[оӮҙ](fg:bg_select) "
disabled = false
min_time = 2000

[status]
style = "bg:bg_select fg:error"
format = '[оӮ¶](fg:bg_select)[ вңҳ $status ]($style)[оӮҙ](fg:bg_select) '
disabled = false
