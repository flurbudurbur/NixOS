"$schema" = 'https://starship.rs/config-schema.json'

format = """
[@THEME_ICON@](fg:iris) \
$username\
$directory\
$git_branch\
$git_status\
$docker_context\
$nix_shell\
$fill\
$nodejs\
$java\
$rust\
$cmd_duration\
$time\n  \
$status\
[уұһӘ](fg:iris) \
"""

palette = "theme"

[directory]
format = "[оӮ¶](fg:overlay)[ $path ]($style)[оӮҙ](fg:overlay) "
style = "bg:overlay fg:pine"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[directory.substitutions]
Documents = "у°Ҳҷ"
Downloads = "пҖҷ "
Music = "пҖҒ "
Pictures = "пҖҫ "

[fill]
style = "fg:overlay"
symbol = " "

[git_branch]
format = "[оӮ¶](fg:overlay)[ $symbol $branch ]($style)[оӮҙ](fg:overlay) "
style = "bg:overlay fg:foam"
symbol = "пҗҳ"

[git_status]
disabled = false
style = "bg:overlay fg:love"
format = '[оӮ¶](fg:overlay)([$all_status$ahead_behind]($style))[оӮҙ](fg:overlay) '
up_to_date = '[ вң“ ](bg:overlay fg:iris)'
untracked = '[?\($count\)](bg:overlay fg:gold)'
stashed = '[\$](bg:overlay fg:iris)'
modified = '[!\($count\)](bg:overlay fg:gold)'
renamed = '[В»\($count\)](bg:overlay fg:iris)'
deleted = '[вңҳ\($count\)](style)'
staged = '[++\($count\)](bg:overlay fg:gold)'
ahead = '[вҮЎ\(${count}\)](bg:overlay fg:foam)'
diverged = 'вҮ•[\[](bg:overlay fg:iris)[вҮЎ\(${ahead_count}\)](bg:overlay fg:foam)[вҮЈ\(${behind_count}\)](bg:overlay fg:rose)[\]](bg:overlay fg:iris)'
behind = '[вҮЈ\(${count}\)](bg:overlay fg:rose)'

[time]
disabled = false
format = " [оӮ¶](fg:overlay)[ $time у°ҙҲ ]($style)[оӮҙ](fg:overlay)"
style = "bg:overlay fg:rose"
time_format = "%I:%M%P"
use_12hr = true

[username]
disabled = false
format = "[оӮ¶](fg:overlay)[ у°§ұ $user ]($style)[оӮҙ](fg:overlay) "
show_always = true
style_root = "bg:overlay fg:iris"
style_user = "bg:overlay fg:iris"

# Languages

[java]
style = "bg:overlay fg:pine"
format = " [оӮ¶](fg:overlay)[ $symbol$version ]($style)[оӮҙ](fg:overlay)"
disabled = false
symbol = "оү– "

[nodejs]
style = "bg:overlay fg:pine"
format = " [оӮ¶](fg:overlay)[ $symbol$version ]($style)[оӮҙ](fg:overlay)"
disabled = false
symbol = "у°Һҷ "

[rust]
style = "bg:overlay fg:pine"
format = " [оӮ¶](fg:overlay)[ $symbol$version ]($style)[оӮҙ](fg:overlay)"
disabled = false
symbol = "оһЁ "

# Environment

[nix_shell]
style = "bg:overlay fg:foam"
format = "[оӮ¶](fg:overlay)[ $symbol$state ]($style)[оӮҙ](fg:overlay) "
disabled = false
symbol = "вқ„ "

[docker_context]
style = "bg:overlay fg:foam"
format = "[оӮ¶](fg:overlay)[ $symbol$context ]($style)[оӮҙ](fg:overlay) "
disabled = false
symbol = "рҹҗі "
only_with_files = true

[cmd_duration]
style = "bg:overlay fg:gold"
format = "[оӮ¶](fg:overlay)[ вҸұ $duration ]($style)[оӮҙ](fg:overlay) "
disabled = false
min_time = 2000

[status]
style = "bg:overlay fg:love"
format = '[оӮ¶](fg:overlay)[ вңҳ $status ]($style)[оӮҙ](fg:overlay) '
disabled = false
